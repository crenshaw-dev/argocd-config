apiVersion: argoproj.io/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  server:
    accounts:
    - enabled: true
      name: admin
    - capabilities:
      - apiKey
      - login
      enabled: true
      name: alice
    - capabilities:
      - login
      name: bob
