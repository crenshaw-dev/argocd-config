apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  commitServer: {}
  controller: {}
  repoServer: {}
  server:
    authEnabled: true
    baseHref: /argo
    cache:
      appStateExpiration: 1h0m0s
      defaultExpiration: 24h0m0s
      globCacheSize: 1000
    compression: gzip
    dexServer:
      address: https://dex:5556
      insecureSkipVerify: false
      tlsEnabled: true
    rootPath: /argo
    tls:
      ciphers:
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      maxVersion: "1.3"
      minVersion: "1.2"
