apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  commitServer:
    grpcTXTServiceConfigEnabled: true
    listen:
      address: 0.0.0.0
      metricsAddress: 127.0.0.1
    log:
      format: json
      level: info
  controller: {}
  dexServer:
    connectorFailureContinue: true
    log:
      format: json
      level: debug
    tlsEnabled: true
  notifications:
    log:
      format: json
      level: info
    processorsCount: 2
    repoServerClient:
      caCertPath: /app/config/reposerver/tls/ca.crt
      clientCertKeyPath: /app/config/reposerver/tls/tls.key
      clientCertPath: /app/config/reposerver/tls/tls.crt
    selfServiceEnabled: true
    tlsEnabled: true
  repoServer: {}
  server: {}
