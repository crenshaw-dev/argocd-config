apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  commitServer: {}
  controller: {}
  repoServer:
    client:
      insecureSkipVerify: false
      timeout: 1m0s
      tlsEnabled: true
  server:
    apiContentTypes:
    - application/json
    authEnabled: true
    baseHref: /argo
    cache:
      appStateExpiration: 1h0m0s
      connectionStatusExpiration: 1h0m0s
      defaultExpiration: 24h0m0s
      globCacheSize: 10000
      oidcExpiration: 3m0s
    compression: gzip
    contentSecurityPolicy: frame-ancestors 'self'
    dexConnection:
      address: https://argocd-dex-server:5556
      insecureSkipVerify: false
      tlsEnabled: true
    grpcTXTServiceConfigEnabled: true
    httpCookieMaxNumber: 50
    k8sClient:
      burst: 100
      maxIdleConnections: 500
      qps: "50"
      retry:
        backoff:
          duration: 200ms
        max: 2
      tcp:
        idleTimeout: 5m0s
        keepAlive: 30s
        timeout: 30s
      tlsHandshakeTimeout: 10s
    listen:
      address: 0.0.0.0
      metricsAddress: 127.0.0.1
    log:
      format: json
      level: info
    profileEnabled: true
    proxyExtensionEnabled: true
    rootPath: /argo
    staticAssetsPath: /shared/app
    syncReplaceAllowed: true
    tls:
      ciphers:
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      maxVersion: "1.3"
      minVersion: "1.2"
    tlsEnabled: true
    webhook:
      parallelismLimit: 50
      refresh:
        workers: 20
    xFrameOptions: sameorigin
