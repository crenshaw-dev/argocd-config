apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  server:
    extensions:
    - connectionTimeout: 2s
      idleConnectionTimeout: 1m0s
      keepAlive: 15s
      maxIdleConnections: 30
      name: httpbin
      services:
      - cluster:
          name: some-cluster
          serverURL: https://some-cluster
        headers:
        - name: Authorization
          value: $extension.httpbin.token
        - name: X-Request-Id
          value: argocd
        url: http://httpbin.org
    - maxIdleConnections: 10
      name: metrics
      services:
      - headers:
        - name: Authorization
          value: $extension.metrics.token
        url: https://metrics.example.com
