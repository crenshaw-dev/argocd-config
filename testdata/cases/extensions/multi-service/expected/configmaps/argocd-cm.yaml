apiVersion: v1
data:
  extension.config: |
    extensions:
    - Backend:
        services:
        - cluster:
            name: some-cluster
            server: https://some-cluster
          headers:
          - name: Authorization
            value: $extension.httpbin.token
          - name: X-Request-Id
            value: argocd
          url: http://httpbin.org
        transport:
          connectionTimeout: 2s
          idleConnectionTimeout: 1m0s
          keepAlive: 15s
          maxIdleConnections: 30
      Name: httpbin
    - Backend:
        services:
        - headers:
          - name: Authorization
            value: $extension.metrics.token
          url: https://metrics.example.com
        transport:
          maxIdleConnections: 10
      Name: metrics
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
