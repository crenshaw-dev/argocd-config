apiVersion: argoproj.io/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  server:
    dex:
      connectors:
      - config:
          clientID: $dex.github.clientId
          clientSecret: $dex.github.clientSecret
          orgs:
          - name: example-org
        id: github
        name: GitHub
        type: github
