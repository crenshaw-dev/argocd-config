apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  commitServer: {}
  controller: {}
  redis:
    compression: gzip
    db: "0"
    keyPrefix: argocd
    sentinel:
      hosts:
      - argocd-redis-ha-announce-0:26379
      - argocd-redis-ha-announce-1:26379
      - argocd-redis-ha-announce-2:26379
      master: argocd
    server: argocd-redis-ha-haproxy:6379
  repoServer: {}
  server: {}
