apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  controller:
    resource:
      customizations:
      - group: apps
        healthLua: |
          return {status="Healthy"}
        ignoreDifferences:
          jsonPointers:
          - /spec/replicas
        kind: Deployment
