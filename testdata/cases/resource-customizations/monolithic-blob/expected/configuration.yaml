apiVersion: argoproj.io/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  controller:
    resource:
      health:
      - group: apps
        healthLua: |
          return {status="Healthy"}
        kind: Deployment
      ignoreDifferences:
      - group: apps
        jsonPointers:
        - /spec/replicas
        kind: Deployment
