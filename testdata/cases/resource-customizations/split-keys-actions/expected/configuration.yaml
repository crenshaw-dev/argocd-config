apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  controller:
    resource:
      customizations:
      - actions:
          definitions:
          - actionLua: |
              return obj
            name: restart
          discoveryLua: |
            actions = {}
            actions["restart"] = {}
            return actions
        group: apps
        kind: Deployment
      - group: cert-manager.io
        healthLua: |
          hs = {}
          hs.status = "Healthy"
          return hs
        kind: Certificate
