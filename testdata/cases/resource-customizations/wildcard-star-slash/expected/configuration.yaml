apiVersion: argo.crenshaw.dev/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  controller:
    resource:
      health:
      - group: '*'
        healthLua: |
          hs = {}
          hs.status = "Healthy"
          return hs
        kind: '*'
        useOpenLibs: true
      ignoreDifferences:
      - group: '*'
        jsonPointers:
        - /metadata/resourceVersion
        kind: '*'
      ignoreResourceUpdates:
      - group: '*'
        jsonPointers:
        - /metadata/generation
        kind: '*'
