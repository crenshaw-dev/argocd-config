apiVersion: argoproj.io/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  controller:
    resource:
      actions:
      - definitions:
        - actionLua: |
            return obj
          name: restart
        discoveryLua: |
          actions = {}
          actions["restart"] = {}
          return actions
        group: apps
        kind: Deployment
        mergeBuiltinActions: true
      health:
      - healthLua: |
          hs = {}
          hs.status = "Healthy"
          return hs
        kind: ConfigMap
      - group: cert-manager.io
        kind: Certificate
        useOpenLibs: true
      ignoreDifferences:
      - group: '*'
        jsonPointers:
        - /spec/replicas
        kind: '*'
        managedFieldsManagers:
        - kube-controller-manager
      - group: admissionregistration.k8s.io
        jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        kind: MutatingWebhookConfiguration
        managedFieldsManagers:
        - kube-controller-manager
      ignoreResourceUpdates:
      - group: '*'
        jsonPointers:
        - /metadata/resourceVersion
        kind: '*'
      - group: argoproj.io
        jsonPointers:
        - /status
        kind: Application
      knownTypeFields:
      - fields:
        - field: spec.template.spec
          type: core/v1/PodSpec
        group: argoproj.io
        kind: Rollout
