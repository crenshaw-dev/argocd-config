apiVersion: argoproj.io/v1alpha1
kind: ArgoCDConfiguration
metadata:
  name: argocd-config
  namespace: argocd
spec:
  controller:
    resource:
      actions:
      - definitions:
        - actionLua: |
            return obj
          name: restart
        - actionLua: |
            obj.spec.paused = true
            return obj
          name: pause
        discoveryLua: |
          actions = {}
          actions["restart"] = {}
          actions["pause"] = {}
          return actions
        group: apps
        kind: Deployment
        mergeBuiltinActions: true
      health:
      - group: apps
        healthLua: |
          hs = {}
          hs.status = "Healthy"
          return hs
        kind: Deployment
        useOpenLibs: true
      - group: cert-manager.io
        healthLua: |
          return {status="Healthy"}
        kind: Certificate
      ignoreDifferences:
      - group: apps
        jsonPointers:
        - /spec/replicas
        kind: Deployment
      ignoreResourceUpdates:
      - group: apps
        jsonPointers:
        - /metadata/resourceVersion
        kind: Deployment
      knownTypeFields:
      - fields:
        - field: spec.template.spec
          type: core/v1/PodSpec
        group: apps
        kind: Deployment
