apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  resource.customizations: |
    apps/Deployment:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        return hs
      health.lua.useOpenLibs: true
      ignoreDifferences:
        jsonPointers:
          - /spec/replicas
      ignoreResourceUpdates:
        jsonPointers:
          - /metadata/resourceVersion
      knownTypeFields:
        - field: spec.template.spec
          type: core/v1/PodSpec
      actions:
        discovery.lua: |
          actions = {}
          actions["restart"] = {}
          actions["pause"] = {}
          return actions
        mergeBuiltinActions: true
        definitions:
          - name: restart
            action.lua: |
              return obj
          - name: pause
            action.lua: |
              obj.spec.paused = true
              return obj
    cert-manager.io/Certificate:
      health.lua: |
        return {status="Healthy"}
